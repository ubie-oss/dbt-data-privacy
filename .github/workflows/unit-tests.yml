name: Unit tests
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/unit-tests.yml
      - macros/**/*
      - integration_tests/**/*

jobs:
  bigquery:
    # Add "id-token" with the intended permissions.
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        dbt-version: ["1.10", "1.11"]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-path: "integration_tests/pyproject.toml"
          python-version: ${{ matrix.python-version }}

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/131500153501/locations/global/workloadIdentityPools/github-oidc-pool/providers/github-oidc-provider
          service_account: dbt-data-privacy@ubie-oss-data-engineering.iam.gserviceaccount.com

      - name: Run unit tests
        id: run_unit_tests
        working-directory: "integration_tests"
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          DBT_VERSION: ${{ matrix.dbt-version }}
        run: |
          uv run nox -s "unit_tests-${PYTHON_VERSION}(dbt_version='${DBT_VERSION}')"

      - name: Save logs and artifacts if failed
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: save-logs-and-target-${{ matrix.python-version }}-${{ matrix.dbt-version }}
          retention-days: 3
          path: |
            integration_tests/logs
            integration_tests/target
      - id: exit
        if: steps.run_unit_tests.outcome != 'success'
        run: |
          exit 1

name: Test the GitHub Actions
on:
  pull_request:
    paths:
      - .github/workflows/test-action.yml
      - .github/actions/generate-models/**
      - integration_tests/models/**/schema.yml

jobs:
  notice-start-of-test:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR start of test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(cat <<EOF
          🚀 Starting the test action...
          Please check the workflow run for more details.
          URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "${body}" \
            --repo "${{ github.repository }}"

  test-action:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        dbt-group: ["dbt-core-1-10", "dbt-core-1-11"]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-path: "integration_tests/pyproject.toml"
          python-version: ${{ matrix.python-version }}

      - name: Install dbt
        run: |
          uv pip install "dbt-core~=${{ matrix.dbt-version }}.0" "dbt-bigquery~=${{ matrix.dbt-version }}.0"

      - name: Install dbt packages
        working-directory: "integration_tests"
        run: |
          dbt deps

      - name: Create dummy dbt profile
        run: |
          mkdir -p integration_tests/dummy_profiles
          cat <<EOF > integration_tests/dummy_profiles/profiles.yml
          default:
            outputs:
              bigquery:
                type: bigquery
                method: service-account
                project: dummy-project
                dataset: dummy_dataset
                location: US
                keyfile_json: '{"type": "service_account", "project_id": "dummy-project", "private_key_id": "dummy", "private_key": "-----BEGIN PRIVATE KEY-----\nMIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQCl\n-----END PRIVATE KEY-----\n", "client_email": "dummy@dummy.iam.gserviceaccount.com", "client_id": "dummy", "auth_uri": "https://accounts.google.com/o/oauth2/auth", "token_uri": "https://oauth2.googleapis.com/token", "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs", "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/dummy%40dummy.iam.gserviceaccount.com"}'
            target: bigquery
          EOF

      - name: Test the action
        id: test-action
        uses: ./.github/actions/generate-models
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          working_directory: "integration_tests"
          dbt_profiles_dir: "${{ github.workspace }}/integration_tests/dummy_profiles"
          dbt_models_dir: "${{ github.workspace }}/integration_tests/models"
          dbt_profile: "default"
          dbt_target: "bigquery"
          dbt_vars_path: "${{ github.workspace }}/integration_tests/resources/vars/vars-bigquery.basic.yml"
          delete_before: "1"
          verbose: "1"

      - name: Delete .gitignore for the generated models
        run: |
          rm -f "${{ github.workspace }}/integration_tests/models/.gitignore"

      - name: Push and revert the generated models
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Configure the git account
          git remote set-url origin "https://github-actions:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Check if there are changes in models
          if [[ -n $(git status --porcelain "${{ github.workspace }}/integration_tests/models") ]]; then
            echo "Changes detected in models. Pushing and reverting for preview..."

            # Push the generated models
            git add "${{ github.workspace }}/integration_tests/models"
            git commit --signoff -m 'chore: preview generated dbt models'
            git push --set-upstream origin "HEAD:${HEAD_REF}"

            # Revert the commit immediately to keep the branch clean
            git revert HEAD --no-edit
            git push --force --set-upstream origin "HEAD:${HEAD_REF}"
          else
            echo "No changes in models to push."
          fi

  report-result:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    needs: test-action
    steps:
      - name: Comment on PR failure
        if: ${{ needs.test-action.result == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "❌ One or more matrix jobs failed. Please check the workflow run for more details." \
            --repo "${{ github.repository }}" \
      - name: Comment on PR success
        if: ${{ needs.test-action.result == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "✅ All matrix jobs passed. Please check the workflow run for more details." \
            --repo "${{ github.repository }}" \
